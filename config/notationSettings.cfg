-- -*- mode: Conf; coding: utf-8-unix -*-
-- this configuration file contains several mappings in the
-- context of the notation phases of the
-- lilypondToBandVideoConverter

-- #########################
-- # AUXILIARY DEFINITIONS #
-- #########################

-- special staff definitions for voices, default is "Staff"
voiceNameToStaffMap = "{"      \
    "drums      : DrumStaff,"  \
    "keyboard   : PianoStaff," \
    "percussion : DrumStaff }"

-- special clef definitions for voices, default is "G"
voiceNameToClefMap = "{"        \
    "bass           : bass_8,"  \
    "drums          : '',"      \
    "guitar         : G_8,"     \
    "keyboardBottom : bass,"    \
    "percussion     : '' }"

-- ########################
-- # EXPORTED DEFINITIONS #
-- ########################

-- mapping from voice name to short name in score file
voiceNameToScoreNameMap = "{" \
    "bass           : bs,"    \
    "bgVocals       : bvc,"   \
    "drums          : dr,"    \
    "guitar         : gtr,"   \
    "keyboard       : kb,"    \
    "keyboardSimple : kb,"    \
    "organ          : org,"   \
    "percussion     : prc,"   \
    "strings        : str,"   \
    "synthesizer    : syn,"   \
    "vocals         : voc }"

-- staff definitions for phases and voices: all phases use the
-- same definitions
phaseAndVoiceNameToStaffMap = "{"      \
    "extract :" voiceNameToStaffMap ","  \
    "midi    :" voiceNameToStaffMap ","  \
    "score   :" voiceNameToStaffMap ","  \
    "video   :" voiceNameToStaffMap "}"

-- special clef definitions for phases and voices: all phases use the
-- same definitions
phaseAndVoiceNameToClefMap = "{"      \
    "extract :" voiceNameToClefMap ","  \
    "midi    :" voiceNameToClefMap ","  \
    "score   :" voiceNameToClefMap ","  \
    "video   :" voiceNameToClefMap "}"

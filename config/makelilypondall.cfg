-- -*- mode: Conf; coding: utf-8-unix -*-
-- global configuration file for makeLilypondAll.py and submodules

-- #######################
-- # AUXILIARY VARIABLES #
-- #######################

programDirectory = "C:/Programme_TT/Multimedia"
audioProgramDirectory = programDirectory "/Audio"
midiProgramDirectory = programDirectory "/MIDI"
videoProgramDirectory = programDirectory "/Video"

targetVideoDirectory = "C:/VideoDateien"

-- ###########################
-- # CONFIGURATION VARIABLES #
-- ###########################

-- ==============
-- == COMMANDS ==
-- ==============

-- location of aac encoder command (optional, otherwise ffmpeg is used)
aacCommandLine = audioProgramDirectory "/QuicktimeAACEncoder/qaac64.exe" \
                 " -V100 -i $1 -o $2"

-- location of ffmpeg command
ffmpegCommand = videoProgramDirectory "/ffmpeg/bin/ffmpeg.exe"

-- location of fluidsynth command
fluidsynthCommand = midiProgramDirectory "/QSynth/fluidsynth.exe"

-- location of lilypond command
lilypondCommand = midiProgramDirectory "/LilyPond/usr/bin/lilypond.exe"

-- location of mp4box command
-- mp4boxCommand = videoProgramDirectory "/MP4Box/mp4box.exe"

-- location of sox command
soxCommandLinePrefix = audioProgramDirectory "/sox/sox.exe" \
                       " --buffer 100000 --multi-threaded"

-- ======================
-- === FILE LOCATIONS ===
-- ======================

-- path of file containing the processing log
loggingFilePath = "/temp/logs/makeLilypondAll.log"

-- path of directory for the soundfonts
soundFontDirectoryPath = midiProgramDirectory "/soundfonts"

-- path of directory where all generated files go
targetDirectoryPath = "generated"

-- path of directory for temporary audio files
tempAudioDirectoryPath = "/temp/MIDI-Rendering-Demo/_current"

-- path of temporary lilypond file
tempLilypondFilePath = "temp.ly"

-- ============================
-- === TARGET VIDEO DEVICES ===
-- ============================

-- list of devices mapping device name onto tuple of key-value pairs
-- with file name suffix for the silent video, the target directory
-- for the videos, the device resolution, height and width (all in
-- pixels), the margin for the videos (in millimeters), the lilypond
-- system size (default is 20) and color and font size of the
-- hardcoded subtitle (when subtitle is not on separated track); also
-- defines video scaling factor for antialiasing and frame rate for
-- the target video

directoryA = "'" targetVideoDirectory "/_ipod-Videos'"
directoryB = "'" targetVideoDirectory "/_lumia-Videos'"
directoryC = "'" targetVideoDirectory "/_internet-Videos'"
-- subtitleColor = 0X8800FFFF
subtitleColor = "2281766911"

-- -----

videoTargetList = "{" \
    "ipad:     { fileNameSuffix: '-i-v'," \
	       " targetVideoDirectoryPath: " directoryA "," \
	       " resolution: 132," \
	       " height: 1024," \
	       " width: 768," \
	       " topBottomMargin: 5," \
	       " leftRightMargin: 10," \
	       " scalingFactor: 4," \
	       " frameRate: 10.0," \
	       " systemSize: 25," \
	       " subtitleColor: " subtitleColor "," \
	       " subtitleFontSize: 20," \
	       " subtitlesAreHardcoded: true }," \
  \
  "lumia:    { fileNameSuffix: '-l-h'," \
	       " targetVideoDirectoryPath: " directoryB "," \
	       " resolution: 282," \
	       " height: 770," \
	       " width: 1280," \
	       " topBottomMargin: 3," \
	       " leftRightMargin: 5," \
	       " scalingFactor: 4," \
	       " frameRate: 10.0," \
	       " systemSize: 15," \
	       " subtitleColor: " subtitleColor "," \
	       " subtitleFontSize: 30," \
	       " subtitlesAreHardcoded: true }," \
  \
  "internet: { fileNameSuffix: '-n-h'," \
	       " targetVideoDirectoryPath: " directoryC "," \
	       " resolution: 75," \
	       " height: 384," \
	       " width: 512," \
	       " topBottomMargin: 5," \
	       " leftRightMargin: 10," \
	       " scalingFactor: 4," \
	       " frameRate: 10.0," \
	       " systemSize: 25," \
	       " subtitleColor: " subtitleColor "," \
	       " subtitleFontSize: 20," \
	       " subtitlesAreHardcoded: true }" \
"}"

-- ============
-- === MISC ===
-- ============

-- comma-separated list of soundfont names (all located in soundfont
-- directory)
-- "FluidR3_GM.SF2"

soundFontNames = "FluidR3_GM.SF2, Ultimate_Drums.sf2"

-- default settings for the artist name and the album name; those
-- values will be used when no value is given for them in the video
-- target definition or in the audio track definition

defaultArtistName = "Dr. TT"
defaultAlbumName  = "Practice Makes Perfect"